server:
  port: 8000

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8100
          predicates:
            - Path=/api/users/**

        - id: store-service
          uri: http://localhost:8200
          predicates:
            - Path=/api/stores/**

        - id: order-service
          uri: http://localhost:8300
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: http://localhost:8400
          predicates:
            - Path=/api/payments/**

        - id: cart-service
          uri: http://localhost:8500
          predicates:
            - Path=/api/cart/**

jwt:
  secret: this-is-a-very-secret-key-for-delivery-project-auth-token